# GitLab CI/CD Configuration for LOF Hacker
# 文档：https://docs.gitlab.com/ee/ci/

stages:
  - test
  - deploy

# 变量配置（在 GitLab UI 中设置）
# Settings → CI/CD → Variables
# 需要配置以下变量：
# - DOTENV_CONTENT: .env 文件内容（Protected & Masked）
# - DEPLOY_SSH_KEY: SSH 私钥（用于部署到服务器）

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip"

# 缓存配置
cache:
  paths:
    - .pip/
    - .venv/

# 测试阶段
test:
  stage: test
  image: python:3.11-slim
  script:
    - python --version
    - pip install -r requirements.txt
    - python -m pytest --version 2>/dev/null || echo "pytest not installed, skipping tests"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
    - when: manual

# 部署阶段
deploy:
  stage: deploy
  image: python:3.11-slim
  script:
    # 1. 从变量创建 .env 文件
    - echo "Creating .env file from CI variable..."
    - echo "$DOTENV_CONTENT" > .env
    - chmod 600 .env

    # 2. 验证 .env 文件
    - echo "Verifying .env file..."
    - if [ ! -f .env ]; then echo "ERROR: .env file not created"; exit 1; fi
    - grep -q "JISILU_SESSION\|JISILU_USERNAME" .env || (echo "ERROR: JISILU config missing"; exit 1)
    - grep -q "EMAIL_PASSWORD" .env || (echo "ERROR: EMAIL_PASSWORD missing"; exit 1)

    # 3. 安装依赖
    - echo "Installing dependencies..."
    - pip install -r requirements.txt

    # 4. 运行主程序
    - echo "Running LOF Arbitrage Monitor..."
    - python main.py

    # 5. 清理敏感文件（可选）
    - echo "Cleaning up..."
    - rm -f .env
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - when: manual
  environment:
    name: production
  tags:
    - docker

# 定时任务（可选）
# 使用 GitLab CI/CD Schedules 功能
# Settings → CI/CD → Schedules
# 可以配置每天 13:00 运行
